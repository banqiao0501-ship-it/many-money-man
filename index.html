<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大富翁共用輔助機台 - 神秘事件版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body onload="renderSetupPlayers()" class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col justify-between p-4 select-none">

    <div id="setup-screen" class="max-w-xl mx-auto my-auto w-full bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        <h1 class="text-3xl font-bold text-center mb-8 text-gray-900 tracking-wider">🎲 大富翁輔助機台</h1>
        
        <div class="grid grid-cols-2 gap-6 mb-6">
            <div>
                <label class="block text-sm font-medium text-gray-500 mb-2">玩家人數 (2-8人)</label>
                <select id="player-count" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-gray-400" onchange="renderSetupPlayers()">
                    <option value="2">2 人</option>
                    <option value="3">3 人</option>
                    <option value="4" selected>4 人</option>
                    <option value="5">5 人</option>
                    <option value="6">6 人</option>
                    <option value="7">7 人</option>
                    <option value="8">8 人</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-500 mb-2">初始金額</label>
                <input id="initial-money" type="number" step="1000" value="15000" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-gray-400 font-mono text-lg">
            </div>
        </div>

        <div class="flex items-center justify-center gap-3 mb-8 bg-purple-50 p-4 rounded-xl border border-purple-100">
            <input type="checkbox" id="mystery-mode" class="w-5 h-5 text-purple-600 rounded focus:ring-purple-500 cursor-pointer">
            <label for="mystery-mode" class="font-bold text-purple-800 cursor-pointer">🔮 啟用神秘事件</label>
        </div>

        <hr class="border-gray-100 mb-6">
        <div id="setup-players-list" class="space-y-4 max-h-96 overflow-y-auto pr-2 mb-8"></div>
        <button onclick="startGame()" class="w-full bg-gray-900 hover:bg-gray-800 text-white font-medium py-4 rounded-xl transition duration-200 shadow-sm tracking-widest text-lg">開始遊戲</button>
    </div>

    <div id="game-screen" class="hidden flex-1 flex flex-col justify-between h-full w-full max-w-7xl mx-auto gap-4">
        <div class="flex justify-between items-center bg-white p-4 rounded-xl border border-gray-100 shadow-sm">
            <div class="text-lg font-bold text-gray-800 tracking-wide">🏛️ 數位銀行中心</div>
            <div class="flex gap-3">
                <button onclick="toggleLog()" class="px-4 py-2 text-sm bg-gray-100 hover:bg-gray-200 rounded-lg transition">交易紀錄</button>
                <button onclick="undoLastTransaction()" class="px-4 py-2 text-sm bg-red-50 hover:bg-red-100 text-red-600 rounded-lg transition">↩ 復原上筆</button>
            </div>
        </div>

        <div class="flex-1 grid grid-cols-3 gap-4 my-2">
            <div id="left-players" class="flex flex-col gap-3 justify-center"></div>
            
            <div class="flex flex-col justify-center items-center relative">
                <div id="loan-shark-ui" class="hidden w-full max-w-[200px] bg-red-50 border-2 border-red-200 text-red-800 p-3 rounded-xl text-center mb-3 shadow-sm flex-col justify-between items-center transition-all">
                    <span class="text-xs font-bold mb-1">🏦 高利貸起點專戶</span>
                    <span id="loan-shark-amt" class="text-lg font-mono font-bold mb-2">$0</span>
                    <button id="btn-claim-loan" onclick="claimLoanShark()" class="hidden w-full bg-red-600 hover:bg-red-700 text-white text-sm font-bold py-2 rounded-lg transition shadow-sm">提領全額 (15000)</button>
                </div>

                <div class="flex flex-col gap-4 justify-center items-center bg-white rounded-2xl border border-gray-100 p-6 shadow-sm w-full relative">
                    <div id="prompt-msg" class="text-sm font-medium text-gray-400 text-center mb-2">請點擊玩家開始轉帳</div>
                    <button id="btn-bank" onclick="selectParticipant('bank')" class="w-full max-w-[180px] bg-gray-800 text-white p-4 rounded-xl text-center font-bold tracking-widest hover:bg-gray-700 transition shadow-sm">🏦 銀行</button>
                    
                    <div class="grid grid-cols-2 gap-4 mb-6 w-full">
                        <button onclick="drawCardEvent('機會')" class="bg-red-500 hover:bg-red-600 text-white font-bold p-4 rounded-xl text-center shadow-sm">❓ 機會</button>
                        <button onclick="drawCardEvent('命運')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold p-4 rounded-xl text-center shadow-sm">❗️ 命運</button>
                    </div>

                    <div class="w-full bg-gray-50 p-4 rounded-xl border border-gray-200 flex flex-col items-center gap-4">
                        <span class="text-sm font-bold text-gray-400">🎲 線上骰子區</span>
                        <div class="flex gap-4 text-5xl text-gray-800 select-none" id="dice-display">
                            <div id="dice-1" class="transition-transform">⚀</div>
                            <div id="dice-2" class="transition-transform">⚀</div>
                        </div>
                        <p id="dice-result-text" class="text-base font-bold text-gray-800 h-6">準備擲骰</p>
                        <button onclick="rollDice()" class="w-full py-2 bg-gray-800 hover:bg-gray-900 text-white font-bold rounded-lg transition-all active:scale-95 shadow-sm">擲骰子</button>
                    </div>
                </div>
            </div>

            <div id="right-players" class="flex flex-col gap-3 justify-center"></div>
        </div>
    </div>

    <div id="card-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl border text-center">
            <div id="card-modal-type" class="text-xs font-bold tracking-widest uppercase mb-4 px-3 py-1 rounded-full inline-block"></div>
            <div id="card-modal-text" class="text-lg font-bold text-gray-900 my-6 leading-relaxed"></div>
            <div id="card-action-zone" class="bg-gray-50 p-4 rounded-xl mb-6 hidden">
                <p id="card-action-msg" class="text-xs text-gray-400 mb-2">💡 請選擇執行玩家（自動連動金錢）：</p>
                <div id="card-target-players" class="grid grid-cols-2 gap-2 max-h-32 overflow-y-auto"></div>
            </div>
            <button id="confirm-close-btn" onclick="closeCardModal()" class="w-full bg-gray-900 hover:bg-gray-800 text-white font-medium py-3 rounded-xl transition">確認並關閉</button>
        </div>
    </div>

    <div id="hand-card-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl border text-center">
            <div class="text-xs font-bold tracking-widest uppercase mb-2 px-3 py-1 rounded-full inline-block bg-indigo-100 text-indigo-800 border border-indigo-300">🎟️ <span id="hc-owner"></span></div>
            <div id="hc-text" class="text-lg font-bold text-gray-900 my-6 leading-relaxed"></div>
            <div class="flex gap-4 mt-6">
                <button onclick="closeHandCardModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-3 rounded-xl transition">收回口袋</button>
                <button onclick="useHandCard()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-xl transition shadow-sm">發動此卡！</button>
            </div>
        </div>
    </div>

    <div id="mystery-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center p-4 z-[60]">
        <div class="bg-purple-900 rounded-3xl p-8 w-full max-w-md shadow-2xl border-4 border-purple-400 text-center relative overflow-hidden">
            <div class="text-sm font-bold tracking-widest uppercase mb-4 px-4 py-1.5 rounded-full inline-block bg-purple-300 text-purple-900 shadow-[0_0_15px_rgba(216,180,254,0.6)]">⚠ 警告：神秘事件觸發 ⚠</div>
            <div id="mystery-modal-text" class="text-xl font-bold text-white my-6 leading-relaxed relative z-10"></div>
            <button onclick="closeMysteryModal()" class="w-full bg-purple-500 hover:bg-purple-400 text-purple-900 font-bold py-3 rounded-xl transition shadow-lg">確認並關閉</button>
        </div>
    </div>

    <div id="keyboard-modal" class="hidden fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center p-4 z-40">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl border border-gray-100">
            <div class="text-center mb-4"><span id="kb-payer-name" class="font-bold px-3 py-1 rounded-lg"></span><span class="text-gray-400 mx-2">➔</span><span id="kb-payee-name" class="font-bold px-3 py-1 rounded-lg"></span></div>
            <div id="kb-display" class="text-right text-4xl font-mono font-bold border-b-2 border-gray-200 pb-2 mb-4 text-gray-900">0</div>
            <div class="grid grid-cols-3 gap-2 mb-4">
                <button id="btn-pass-start" onclick="handlePassStart()" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold py-2 rounded-lg text-sm border border-indigo-200 shadow-sm transition">🏁 通過起點！<br>(+3000)</button>
                <button onclick="addAmount(1000)" class="bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 rounded-lg text-sm font-bold">+1000</button>
                <button onclick="addAmount(500)" class="bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 rounded-lg text-sm font-bold">+500</button>
            </div>
            <div class="grid grid-cols-3 gap-3 mb-4 font-mono text-xl">
                <button onclick="pressNum('1')" class="bg-gray-50 hover:bg-gray-100 py-3 rounded-xl font-bold">1</button>
                <button onclick="pressNum('2')" class="bg-gray-50 hover:bg-gray-100 py-3 rounded-xl font-bold">2</button>
                <button onclick="pressNum('3')" class="bg-gray-50 hover:bg-gray-100 py-3 rounded-xl font-bold">3</button>
                <button onclick="pressNum('4')" class="bg-gray-50 hover:bg-gray-100 py-3 rounded-xl font-bold">4</button>
                <button onclick="pressNum('5')" class="bg-gray-50 hover:bg-gray-100 py-3 rounded-xl font-bold">5</button>
                <button onclick="pressNum('6')" class="bg-gray-50 hover:bg-gray-100 py-3 rounded-xl font-bold">6</button>
                <button onclick="pressNum('7')" class="bg-gray-50 hover:bg-gray-100 py-3 rounded-xl font-bold">7</button>
                <button onclick="pressNum('8')" class="bg-gray-50 hover:bg-gray-100 py-3 rounded-xl font-bold">8</button>
                <button onclick="pressNum('9')" class="bg-gray-50 hover:bg-gray-100 py-3 rounded-xl font-bold">9</button>
                <button onclick="pressNum('C')" class="bg-red-50 hover:bg-red-100 text-red-600 py-3 rounded-xl font-bold">C</button>
                <button onclick="pressNum('0')" class="bg-gray-50 hover:bg-gray-100 py-3 rounded-xl font-bold">0</button>
                <button onclick="pressNum('00')" class="bg-gray-50 hover:bg-gray-100 py-3 rounded-xl font-bold">00</button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="closeKeyboard()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-3 rounded-xl">取消</button>
                <button onclick="executeTransaction()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-medium py-3 rounded-xl shadow-sm">確認轉帳</button>
            </div>
        </div>
    </div>

    <div id="log-panel" class="hidden fixed top-0 right-0 h-full w-80 bg-white shadow-2xl border-l border-gray-100 p-6 flex flex-col justify-between z-[70]">
        <div>
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-bold">交易紀錄歷史</h3>
                <button onclick="toggleLog()" class="text-gray-400 hover:text-gray-600 text-xl">✕</button>
            </div>
            <div id="log-list" class="space-y-3 max-h-[80vh] overflow-y-auto font-mono text-sm pr-1"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="ui.js"></script>
    <script src="main.js"></script>
</body>
</html>
